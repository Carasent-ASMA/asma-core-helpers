name: Debug Push Trigger

on:
    push:
        branches:
            - master
    workflow_dispatch:

permissions:
    contents: read

jobs:
    debug:
        runs-on: ubuntu-latest
        steps:
            - name: Print event context
              run: |
                  echo "event=${{ github.event_name }}"
                  echo "ref=${{ github.ref }}"
                  echo "sha=${{ github.sha }}"
                  echo "actor=${{ github.actor }}"
                  echo "workflow=${{ github.workflow }}"
