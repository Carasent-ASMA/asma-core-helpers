name: Build and Publish

on:
  push:
    branches:
      - master

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Build package
        run: pnpm build
      
      - name: Analyze commits and determine version bump
        id: check_publish
        run: |
          # Get commits since last tag (or all if no tags)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            # No tags yet, get all commits
            COMMITS=$(git log --format=%s origin/master)
          else
            # Get commits since last tag
            COMMITS=$(git log ${LAST_TAG}..HEAD --format=%s)
          fi
          
          echo "Analyzing commits for version bump..."
          echo "$COMMITS"
          
          # Initialize bump type (none/patch/minor/major)
          # Priority: major > minor > patch
          BUMP_TYPE="none"
          SHOULD_PUBLISH="false"
          
          # Check each commit for conventional commit types
          while IFS= read -r commit; do
            # Skip empty lines
            [ -z "$commit" ] && continue
            
            # Check for breaking change (!) - MAJOR
            if echo "$commit" | grep -qE '^[a-z]+!(\([^)]*\))?:'; then
              BUMP_TYPE="major"
              SHOULD_PUBLISH="true"
              echo "Found breaking change: $commit"
              continue
            fi
            
            # Check for feat - MINOR (only if not already major)
            if [ "$BUMP_TYPE" != "major" ] && echo "$commit" | grep -qE '^feat(\([^)]*\))?:'; then
              BUMP_TYPE="minor"
              SHOULD_PUBLISH="true"
              echo "Found feature: $commit"
              continue
            fi
            
            # Check for fix, perf - PATCH (only if not already minor or major)
            if [ "$BUMP_TYPE" != "major" ] && [ "$BUMP_TYPE" != "minor" ] && \
               echo "$commit" | grep -qE '^(fix|perf)(\([^)]*\))?:'; then
              BUMP_TYPE="patch"
              SHOULD_PUBLISH="true"
              echo "Found fix/perf: $commit"
            fi
          done <<< "$COMMITS"
          
          # Output results
          echo "should_publish=${SHOULD_PUBLISH}" >> $GITHUB_OUTPUT
          echo "bump_type=${BUMP_TYPE}" >> $GITHUB_OUTPUT
          
          if [ "$SHOULD_PUBLISH" = "true" ]; then
            echo "✅ Will publish with ${BUMP_TYPE} version bump"
          else
            echo "⏭️  No version bump needed (no feat/fix/perf/breaking commits)"
          fi
      
      - name: Configure git
        if: steps.check_publish.outputs.should_publish == 'true'
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Bump version
        if: steps.check_publish.outputs.should_publish == 'true'
        run: |
          npm version ${{ steps.check_publish.outputs.bump_type }} -m "chore: bump version to %s [skip ci]"
          git push --follow-tags
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Publish to npm
        if: steps.check_publish.outputs.should_publish == 'true'
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      
      - name: Build summary
        run: |
          echo "### Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Dependencies installed" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Package built successfully" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.check_publish.outputs.should_publish }}" == "true" ]; then
            echo "- ✅ Published to npm with ${{ steps.check_publish.outputs.bump_type }} version bump" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⏭️ Publish skipped (no feat/fix/perf/breaking commits found)" >> $GITHUB_STEP_SUMMARY
          fi
